<html>
<head>
    <title>Catalog</title>
</head>
<body>
    {% if products %}
        {% for product in products %}
            <h1><a href="{{ url_for('get_item', id=product.id) }}">{{ product.name }}</a></h1>
        {% endfor %}
    {% else %}
        <h1>No products</h1>
    {% endif %}
</body>
</html>
